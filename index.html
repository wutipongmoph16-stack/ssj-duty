<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบตรวจสอบเวรรักษาอาคาร</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      body {
        font-family: "Prompt", sans-serif;
        background-color: #f4f7f6;
        color: #333;
      }
      .header-banner {
        background: linear-gradient(135deg, #0f5298, #2575fc);
        color: white;
        padding: 30px 20px;
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .duty-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        transition: transform 0.2s;
        margin-bottom: 15px;
      }
      .duty-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
      }
      .card-icon {
        font-size: 2rem;
        color: #2575fc;
      }
      .badge-next {
        background-color: #ff4757;
        font-weight: 500;
      }
      .profile-pic {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid white;
      }
    </style>
  </head>
  <body>
    <div class="header-banner text-center mb-4">
      <div class="d-flex justify-content-center align-items-center mb-2">
        <img
          id="userPicture"
          src=""
          class="profile-pic d-none me-3"
          alt="Profile"
        />
        <h5 class="mb-0">
          สวัสดีคุณ <span id="displayName" class="fw-bold">กำลังโหลด...</span>
        </h5>
      </div>
      <h4 class="fw-bold mb-1">ตารางเวรรักษาอาคาร</h4>
      <p class="mb-0 opacity-75 small">สำนักงานสาธารณสุขจังหวัดลพบุรี</p>
    </div>

    <div id="jobViewContainer" class="d-none">
      <div class="card border-0 shadow-sm mb-4" style="border-radius: 20px">
        <div class="card-body p-4">
          <h4 class="fw-bold text-primary mb-4 text-center">
            📋 ระเบียบปฏิบัติงาน
          </h4>

          <div
            id="dynamicRulesContainer"
            class="list-group list-group-flush"
          ></div>

          <div class="text-center mt-4">
            <button
              class="btn btn-outline-primary btn-sm rounded-pill"
              onclick="window.location.href = 'index.html'"
            >
              ดูตารางเวรทั้งหมด
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="container pb-5">
      <div id="scheduleContainer" class="row"></div>
    </div>

    <div class="container mt-n4">
      <div id="liveStatusContainer"></div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      // ⚙️ ตั้งค่าตัวแปร
      const LIFF_ID = "2010019868-HUONxCMz";
      const API_URL =
        "https://script.google.com/macros/s/AKfycbyQmeP3x0nfAdbemXyfblabC0vjiXhErHJfh3Jqse_eoL1edue6pdbJQlGHXWDRnSQGkA/exec";

      // 1. Initialize LIFF
      async function initializeLiff() {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            document.getElementById("displayName").innerText =
              profile.displayName;
            const picUrl = profile.pictureUrl;
            if (picUrl) {
              const img = document.getElementById("userPicture");
              img.src = picUrl;
              img.classList.remove("d-none");
            }
            fetchScheduleData(); // เรียก API ดึงข้อมูล
          } else {
            liff.login();
          }
        } catch (err) {
          console.error("LIFF Init Error:", err);
          Swal.fire("ข้อผิดพลาด", "ไม่สามารถเชื่อมต่อ LINE ได้", "error");
        }
      }

      // ==========================================
      // 2. Fetch Data จาก GAS (ดึงข้อมูล API)
      // ==========================================
      async function fetchScheduleData() {
        // แสดงหน้าจอโหลด (Loading Screen) ด้วย SweetAlert2
        Swal.fire({
          title: "กำลังโหลดข้อมูล...",
          text: "กรุณารอสักครู่",
          allowOutsideClick: false,
          didOpen: () => {
            Swal.showLoading();
          },
        });

        try {
          const response = await fetch(API_URL);
          const result = await response.json();

          // ตรวจสอบว่า API ตอบกลับมาสำเร็จหรือไม่
          if (result.status === "success") {
            // ส่งข้อมูลตารางเวร (schedule) และภารกิจวันนี้ (currentDutyTasks) ไปให้ฟังก์ชันสร้างหน้าเว็บ
            renderSchedule(result.schedule, result.currentDutyTasks);
            // สั่งวาดหน้าระเบียบปฏิบัติ
            renderRules(result.rules);

            // ปิดหน้าจอโหลดเมื่อสำเร็จ
            Swal.close();
          } else {
            Swal.fire("ข้อผิดพลาด", "ไม่สามารถโหลดข้อมูลตารางเวรได้", "error");
          }
        } catch (error) {
          console.error("Fetch Error:", error);
          Swal.fire("ข้อผิดพลาด", "การเชื่อมต่อเซิร์ฟเวอร์ขัดข้อง", "error");
        }
      }

      // ==========================================
      // 3. Render Data แบบ Seamless DOM (สร้างหน้าเว็บ)
      // ==========================================
      function renderSchedule(data, currentTasks) {
        const container = document.getElementById("scheduleContainer");
        const liveContainer = document.getElementById("liveStatusContainer");
        const now = new Date().getTime(); // เวลาปัจจุบัน (Timestamp)

        // ล้างข้อมูลเก่าทิ้งทั้งหมดเพื่อป้องกันการแสดงผลซ้ำซ้อน
        container.innerHTML = "";
        if (liveContainer) liveContainer.innerHTML = "";

        // ------------------------------------------
        // ส่วนที่ 1: จัดการ Live Status (ภารกิจของวันนี้)
        // ------------------------------------------
        if (liveContainer && currentTasks && currentTasks.length > 0) {
          // ค้นหาภารกิจ "แรกสุด" ที่เวลายังมาไม่ถึง (เอาเวลาปัจจุบันไปเทียบ)
          const nextTask = currentTasks.find((t) => t.rawTime > now);

          if (nextTask) {
            // กรณีมีภารกิจที่ต้องทำต่อไป
            liveContainer.innerHTML = `
                <div class="card border-0 shadow-sm mb-4" style="border-radius: 20px; background: #fff;">
                    <div class="card-body p-4 text-center">
                        <span class="badge bg-success mb-2">ภารกิจปัจจุบันของคุณ</span>
                        <h2 class="fw-bold text-primary mb-1">${nextTask.name}</h2>
                        <p class="text-muted mb-3">กำหนดเวลา: ${nextTask.time} น.</p>
                        <hr>
                        <small class="text-secondary">ดำเนินการตามระเบียบ สสจ.ลพบุรี</small>
                    </div>
                </div>
            `;
          } else {
            // กรณีเวลาเลยภารกิจสุดท้ายไปแล้ว (ทำงานครบถ้วน)
            liveContainer.innerHTML = `
                <div class="alert alert-light text-center border-0 shadow-sm mb-4" style="border-radius: 15px;">
                    <h5 class="mb-0 text-success fw-bold">✅ คุณปฏิบัติหน้าที่ครบถ้วนแล้วสำหรับวันนี้</h5>
                </div>
            `;
          }
        }

        // ------------------------------------------
        // ส่วนที่ 2: จัดการตารางเวรภาพรวม (Upcoming Schedule)
        // ------------------------------------------
        if (!data || data.length === 0) {
          // กรณีไม่มีข้อมูลเวรในอนาคตเลย
          container.innerHTML = `
            <div class="col-12 text-center text-muted mt-5">
                <p>📭 ยังไม่มีการจัดตารางเวรในอนาคต</p>
            </div>
        `;
          return;
        }

        // วนลูปสร้างการ์ดตารางเวร
        data.forEach((item, index) => {
          // ไฮไลต์การ์ดใบแรก (เวรถัดไป) ให้ดูเด่นขึ้น
          const isNext = index === 0;
          const badgeHtml = isNext
            ? `<span class="badge badge-next rounded-pill mb-2">เวรถัดไป</span>`
            : "";
          const cardBorder = isNext ? "border-primary border-2" : "";

          const cardHtml = `
            <div class="col-12 col-md-6 mb-3">
                <div class="card duty-card ${cardBorder} p-3">
                    <div class="d-flex align-items-center">
                        <div class="card-icon me-3">
                            🗓️
                        </div>
                        <div class="flex-grow-1">
                            ${badgeHtml}
                            <h5 class="mb-1 fw-bold text-dark">${item.date}</h5>
                            <p class="mb-0 text-muted small"><i class="bi bi-person-fill"></i> ผู้ปฏิบัติงาน: <strong>${item.person}</strong></p>
                        </div>
                    </div>
                </div>
            </div>
        `;
          container.insertAdjacentHTML("beforeend", cardHtml);
        });
      }

      // ฟังก์ชันวาดระเบียบปฏิบัติงาน
      function renderRules(rulesData) {
        const container = document.getElementById("dynamicRulesContainer");
        container.innerHTML = ""; // ล้างของเก่า

        if (!rulesData || rulesData.length === 0) {
          container.innerHTML =
            '<div class="text-center text-muted py-3">ยังไม่มีข้อมูลระเบียบปฏิบัติงาน</div>';
          return;
        }

        // วนลูปวาดรายการที่ดึงมาจาก Google Sheets
        rulesData.forEach((rule) => {
          const itemHtml = `
            <div class="list-group-item border-0 d-flex justify-content-between align-items-center px-0">
                <span><strong class="text-secondary">${rule.no}.</strong> ${rule.task}</span> 
                <span class="badge bg-light text-dark border">${rule.time}</span>
            </div>
        `;
          container.insertAdjacentHTML("beforeend", itemHtml);
        });
      }

      // เริ่มการทำงานเมื่อหน้าเว็บโหลดเสร็จ
      window.onload = () => {
        initializeLiff();
      };
    </script>
  </body>
</html>
